# CI/CD Pipeline for IT Help Desk Backend
# This pipeline runs on every push and pull request to ensure code quality,
# security, and automated deployment to AWS EC2.

name: Backend CI/CD Pipeline

# Trigger pipeline on push to main and on all pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ============================================
  # CI Stage: Build, Test, Analyse, and Scan
  # ============================================
  ci:
    name: CI - Build, Test, and Analyse
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java 17 with Maven caching for faster builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Install project dependencies and compile the code
      - name: Build with Maven
        run: mvn clean compile -DskipTests

      # Step 4: Run unit and integration tests with H2 in-memory database
      - name: Run tests
        run: mvn test -Dspring.profiles.active=test

      # Step 5: Run static code analysis (SpotBugs, PMD) and code coverage (JaCoCo)
      # This executes all analysis plugins configured in pom.xml during the verify phase
      - name: Run static analysis and code coverage
        run: mvn verify -DskipTests -Dspring.profiles.active=test

      # Step 6: Run Snyk dependency vulnerability scan for Maven dependencies
      - name: Run Snyk security scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium
        continue-on-error: true

      # Step 7: Run Semgrep security vulnerability scanning
      # Semgrep scans for security issues, code smells, and potential vulnerabilities
      - name: Run Semgrep security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/java
            p/security-audit
            p/owasp-top-ten
        continue-on-error: true

      # Step 7: Upload SpotBugs analysis report as a build artifact
      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugs/

      # Step 8: Upload PMD analysis report as a build artifact
      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: target/pmd*

      # Step 9: Upload JaCoCo code coverage report as a build artifact
      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Step 10: Upload the built JAR file as a build artifact for deployment
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # ============================================
  # CD Stage: Deploy to AWS EC2 (only on push to main)
  # ============================================
  cd:
    name: CD - Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      # Step 1: Download the built JAR artifact from the CI stage
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./target

      # Step 2: Stop the application before deploying new JAR
      - name: Stop application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop helpdesk-api || true
            sudo mkdir -p /opt/helpdesk-api
            sudo chown ubuntu:ubuntu /opt/helpdesk-api

      # Step 3: Copy the JAR file to EC2 instance
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/opt/helpdesk-api/"
          strip_components: 1

      # Step 4: Restart the application on EC2 and run smoke test
      - name: Restart and smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart helpdesk-api
            sleep 30
            curl -f http://localhost:8080/api/health || echo "Health check pending"
