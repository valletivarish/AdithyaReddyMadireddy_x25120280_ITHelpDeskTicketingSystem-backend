# Test Configuration - Uses H2 in-memory database for isolated testing
# This avoids needing a running PostgreSQL instance during CI/CD builds

# H2 In-Memory Database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration for testing
jwt.secret=TestSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256AlgorithmTesting2024
jwt.expiration=86400000

# Disable Swagger in tests
springdoc.api-docs.enabled=false
