# IT Help Desk Ticketing System - Application Configuration
# This file configures the Spring Boot application for local development

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/helpdesk_db
spring.datasource.username=default
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# update mode creates/updates tables based on entity definitions
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Secret key for signing JWT tokens (minimum 256 bits for HS256)
jwt.secret=ThisIsASecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024
jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration
logging.level.com.helpdesk=DEBUG
logging.level.org.springframework.security=INFO
