# Server port for local development
server.port=8081

# H2 In-Memory Database Configuration for testing and local development
spring.datasource.url=jdbc:h2:mem:helpdesk_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Console for debugging
spring.h2.console.enabled=true

# JWT Configuration
jwt.secret=ThisIsASecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm2024
jwt.expiration=86400000
